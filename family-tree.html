<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree — SIR Family Forms</title>
  <meta name="theme-color" content="#195b45">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="family-tree.css?v=26-07-08-02">
</head>
<body>
  <div class="ft-toolbar" role="toolbar" aria-label="Family Tree tools">
    <button id="ftExportSvg" type="button">Export SVG</button>
    <button id="ftExportPng" type="button">Export Image</button>
    <button id="ftExportPdf" type="button" class="secondary">Export PDF</button>
    <button id="ftCopyScript" type="button" class="secondary">Copy FamilyScript</button>
    <button id="ftDownloadScript" type="button" class="secondary">Download FamilyScript</button>
    <div class="ft-zoom-group" aria-label="Zoom controls">
      <button id="ftZoomOut" type="button" class="secondary" aria-label="Zoom out">&minus;</button>
      <button id="ftZoomFit" type="button" class="secondary" aria-label="Fit">Fit</button>
      <button id="ftZoomIn" type="button" class="secondary" aria-label="Zoom in">&plus;</button>
    </div>
  </div>

  <main class="ft-canvas-wrap">
    <div id="familyTreeCanvas" aria-live="polite"></div>
  </main>

  <div id="ftToast" role="status" aria-live="polite"></div>
  <script>
    function fitFamilyTreeToWindow() {
      const wrap = document.querySelector(".ft-canvas-wrap");
      const svg = document.querySelector("svg.family-tree-svg");
      if (!wrap || !svg) return;
  
      const vb = svg.viewBox?.baseVal;
      const svgWidth = vb?.width || Number(svg.getAttribute("width")) || svg.getBoundingClientRect().width;
      const svgHeight = vb?.height || Number(svg.getAttribute("height")) || svg.getBoundingClientRect().height;
  
      if (!svgWidth || !svgHeight) return;
  
      const availableWidth = Math.max(260, wrap.clientWidth - 24);
      const availableHeight = Math.max(260, wrap.clientHeight - 24);
  
      const fitZoom = Math.min(1, availableWidth / svgWidth, availableHeight / svgHeight);
  
      svg.style.transform = `scale(${fitZoom})`;
      svg.style.transformOrigin = "top left";
  
      wrap.scrollLeft = 0;
      wrap.scrollTop = 0;
    }
  
    document.addEventListener("click", event => {
      if (event.target?.id !== "ftZoomFit") return;
      event.preventDefault();
      event.stopImmediatePropagation();
      setTimeout(fitFamilyTreeToWindow, 0);
    }, true);
  </script>
  <script type="module" src="family-tree.js?v=26-07-08-02"></script>
</body>
</html>
