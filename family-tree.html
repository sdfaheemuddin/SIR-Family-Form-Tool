<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree — SIR Family Forms</title>
  <meta name="theme-color" content="#195b45">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="styles.css?v=26-07-08-06">
  <link rel="stylesheet" href="popups/person-popup.css?v=26-07-08-06">
  <link rel="stylesheet" href="family-tree.css?v=26-07-08-06">
  <style>
    .native-applicant-popup .modal,
    .native-person-popup .modal {
      max-height: calc(100vh - 24px);
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="ft-toolbar" role="toolbar" aria-label="Family Tree tools">
    <button id="ftAddApplicant" type="button">Add Applicant</button>
    <button id="ftToggleDetailsPanel" type="button" class="secondary">Show selected details</button>
    <button id="ftExportPdf" type="button" class="secondary">Export PDF</button>
  </div>

  <section id="ftSelectedPanel" class="ft-selected-panel" hidden>
    <h3 id="ftSelectedTitle">Selected details</h3>
    <div id="ftSelectedContent" class="ft-selected-grid"></div>
  </section>

  <main class="ft-canvas-wrap">
    <div id="familyTreeCanvas" aria-live="polite"></div>
  </main>

  <div id="modalRoot"></div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div id="ftToast" role="status" aria-live="polite"></div>

  <script type="module">
    import "./family-tree.js?v=26-07-08-06";
    import { loadState, saveState } from "./storage.js";
    import { formatAadhaar } from "./core.js";
    import { openPersonPopup, initPersonPopupOverrides } from "./popups/person-popup.js?v=26-07-08-06";
    import { openApplicantPopup, initApplicantPopupOverrides } from "./popups/applicant-popup.js?v=26-07-08-06";

    const PANEL_KEY = "sir_family_tree_selected_panel";
    const state = loadState();
    const commit = () => saveState(state);
    const canvas = document.getElementById("familyTreeCanvas");
    const panel = document.getElementById("ftSelectedPanel");
    const panelTitle = document.getElementById("ftSelectedTitle");
    const panelContent = document.getElementById("ftSelectedContent");
    const panelButton = document.getElementById("ftToggleDetailsPanel");
    let enhancing = false;
    let selectedPersonId = "";
    let panelEnabled = localStorage.getItem(PANEL_KEY) === "1";

    initPersonPopupOverrides(state, commit);
    initApplicantPopupOverrides(state, commit);

    function dmy(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return match ? `${match[3]}-${match[2]}-${match[1]}` : String(value || "");
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }

    function trunc(value, limit = 25) {
      const text = String(value || "").trim();
      return text.length > limit ? text.slice(0, limit - 1) + "…" : text;
    }

    function personById(id) {
      return state.people.find(person => person.person_id === id) || null;
    }

    function applicantByPersonId(id) {
      return state.applicants.find(applicant => applicant.person_id === id) || null;
    }

    function splitNameEpic(text) {
      const raw = String(text || "").trim();
      const match = raw.match(/^(.*?)\s*\(([^()]*)\)\s*$/);
      if (!match) return { name: raw, epic: "" };
      return { name: match[1].trim(), epic: match[2].trim() };
    }

    function actionIcon(action, x, label, symbol) {
      return `<g class="ft-action" data-ft-action="${action}" tabindex="0" role="button" aria-label="${esc(label)}">
        <title>${esc(label)}</title>
        <rect class="ft-action-bg" x="${x}" y="6" width="19" height="19" rx="5"></rect>
        <text class="ft-action-symbol" x="${x + 9.5}" y="20" text-anchor="middle">${esc(symbol)}</text>
      </g>`;
    }

    function selectedCell(label, value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return `<div class="ft-selected-cell"><span class="ft-selected-label">${esc(label)}</span><span class="ft-selected-value">${esc(text)}</span></div>`;
    }

    function renderSelectedPanel() {
      panelButton.textContent = panelEnabled ? "Hide selected details" : "Show selected details";
      if (!panelEnabled) {
        panel.hidden = true;
        return;
      }
      if (!selectedPersonId) {
        panel.hidden = false;
        panelTitle.textContent = "Selected details";
        panelContent.innerHTML = `<div class="ft-selected-cell"><span class="ft-selected-value">Select a person box to view details.</span></div>`;
        return;
      }
      const person = personById(selectedPersonId);
      const applicant = applicantByPersonId(selectedPersonId);
      if (!person && !applicant) {
        panel.hidden = false;
        panelTitle.textContent = "Selected details";
        panelContent.innerHTML = `<div class="ft-selected-cell"><span class="ft-selected-value">Details not found for this box.</span></div>`;
        return;
      }
      const cells = [
        selectedCell("Name", person?.name),
        selectedCell("Current EPIC", person?.epic_number),
        selectedCell("Phone", applicant?.phone_number),
        selectedCell("Aadhaar", applicant?.aadhaar_number ? formatAadhaar(applicant.aadhaar_number) : ""),
        selectedCell("Date of Birth", applicant?.date_of_birth ? dmy(applicant.date_of_birth) : ""),
        selectedCell("State / District", [person?.state_2002, person?.district_2002].filter(Boolean).join(", ")),
        selectedCell("AC / Part / Serial", [person?.ac_no_2002 ? `AC: ${person.ac_no_2002}` : "", person?.part_no_2002 ? `Part: ${person.part_no_2002}` : "", person?.sl_no_2002 ? `Serial: ${person.sl_no_2002}` : ""].filter(Boolean).join(", ")),
        selectedCell("2002 Name", person?.name_as_per_2002),
        selectedCell("2002 EPIC", person?.epic_number_2002),
        selectedCell("Relative", person?.relative_name_2002)
      ].join("");
      panel.hidden = false;
      panelTitle.textContent = person?.name || "Selected details";
      panelContent.innerHTML = cells || `<div class="ft-selected-cell"><span class="ft-selected-value">No details available.</span></div>`;
    }

    function enhanceTree() {
      if (enhancing) return;
      enhancing = true;
      try {
        const svg = canvas?.querySelector("svg.family-tree-svg");
        if (!svg) return;
        svg.querySelectorAll(".ft-person").forEach(nodeEl => {
          nodeEl.querySelectorAll("[data-ft-name-line],[data-ft-epic-line],.ft-action").forEach(el => el.remove());
          const rect = nodeEl.querySelector(".ft-box");
          if (rect) rect.setAttribute("height", "90");
          const originalName = nodeEl.querySelector(".ft-name:not([data-ft-name-line])");
          if (originalName) originalName.style.display = "none";
          nodeEl.querySelectorAll(".ft-meta:not([data-ft-epic-line])").forEach(el => { el.style.display = "none"; });

          const personId = nodeEl.getAttribute("data-node-id") || "";
          const person = personById(personId);
          const applicant = applicantByPersonId(personId);
          const parsed = splitNameEpic(originalName?.textContent || "");
          const name = person?.name || parsed.name || "Unknown";
          const epic = person?.epic_number || parsed.epic || "";
          const nameX = Number(originalName?.getAttribute("x")) || 14;

          nodeEl.insertAdjacentHTML("beforeend", `<text class="ft-name" data-ft-name-line="1" x="${nameX}" y="22">${esc(trunc(name, 24))}</text>`);
          if (epic) nodeEl.insertAdjacentHTML("beforeend", `<text class="ft-meta" data-ft-epic-line="1" x="${nameX}" y="40">${esc(trunc(epic, 28))}</text>`);

          let actions = "";
          if (applicant) actions += actionIcon("applicant", 204, "Edit applicant details", "✎");
          if (person) actions += actionIcon("person", 227, "Edit people details", "▤");
          if (actions) nodeEl.insertAdjacentHTML("beforeend", actions);
        });
      } finally {
        enhancing = false;
      }
      renderSelectedPanel();
    }

    panelButton.addEventListener("click", () => {
      panelEnabled = !panelEnabled;
      localStorage.setItem(PANEL_KEY, panelEnabled ? "1" : "0");
      renderSelectedPanel();
    });

    document.getElementById("ftAddApplicant")?.addEventListener("click", () => {
      openApplicantPopup("").catch(error => alert(error.message || "Could not open Applicant popup."));
    });

    canvas?.addEventListener("click", event => {
      const action = event.target.closest?.(".ft-action");
      if (action) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        const personGroup = action.closest(".ft-person");
        const personId = personGroup?.getAttribute("data-node-id") || "";
        const kind = action.getAttribute("data-ft-action");
        if (kind === "person") {
          if (!personById(personId)) return alert("People record not found for this box.");
          openPersonPopup({ personId, state, commit }).catch(error => alert(error.message || "Could not open People popup."));
        }
        if (kind === "applicant") {
          const applicant = applicantByPersonId(personId);
          if (!applicant) return alert("Applicant record not found for this box.");
          openApplicantPopup(applicant.applicant_id).catch(error => alert(error.message || "Could not open Applicant popup."));
        }
        return;
      }

      const personGroup = event.target.closest?.(".ft-person");
      if (!personGroup) return;
      selectedPersonId = personGroup.getAttribute("data-node-id") || "";
      panelEnabled = true;
      localStorage.setItem(PANEL_KEY, "1");
      setTimeout(renderSelectedPanel, 0);
    }, true);

    document.addEventListener("sir:data-changed", () => {
      setTimeout(() => window.location.reload(), 160);
    });

    new MutationObserver(() => enhanceTree()).observe(canvas, { childList: true });
    setTimeout(enhanceTree, 100);
    renderSelectedPanel();
  </script>
</body>
</html>
