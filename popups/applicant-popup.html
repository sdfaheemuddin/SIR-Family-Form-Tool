<form class="applicant-popup-form" autocomplete="off">
  <div class="error-box" data-error></div>

  <div class="form-grid">
    <label class="stacked applicant-person-field">
      <span class="required">Applicant Name</span>
      <div class="inline-select-action">
        <select name="person_id" required></select>
        <button type="button" class="small secondary icon-btn" data-edit-applicant-person title="Edit selected applicant person" aria-label="Edit selected applicant person">✎</button>
      </div>
    </label>

    <label class="stacked">
      <span class="required">Mapper Relationship</span>
      <select name="mapper_relationship" required></select>
    </label>

    <label class="stacked">
      <span class="required">Mapper Name</span>
      <select name="mapper_person_id" required></select>
    </label>

    <label class="stacked">
      <span class="required">Phone Number</span>
      <input name="phone_number" type="tel" inputmode="numeric" maxlength="10" autocomplete="off" required>
    </label>

    <label class="stacked">
      <span>Aadhaar Number</span>
      <input name="aadhaar_number" type="text" inputmode="numeric" maxlength="14" autocomplete="off">
    </label>

    <label class="stacked">
      <span class="required">Date of Birth</span>
      <input name="date_of_birth" type="date" max="2009-12-31" required>
    </label>

    <label class="stacked">
      <span class="required">Father</span>
      <select name="father_person_id" required></select>
    </label>

    <label class="stacked">
      <span class="required">Mother</span>
      <select name="mother_person_id" required></select>
    </label>

    <label class="stacked">
      <span>Spouse</span>
      <select name="spouse_person_id"></select>
    </label>

    <div class="stacked photo-field">
      <span>Applicant Photo</span>
      <input name="photo_file" type="file" accept="image/*">
      <img class="photo-preview" alt="Applicant photo preview" data-photo-preview hidden>
      <button type="button" class="small secondary" data-edit-photo hidden>Edit Photo</button>
      <button type="button" class="small secondary" data-remove-photo hidden>Remove Photo</button>
    </div>
  </div>

  <div class="modal-actions">
    <button type="button" class="secondary" data-cancel>Cancel</button>
    <button type="submit">Save Applicant</button>
  </div>
</form>
